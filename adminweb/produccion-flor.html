<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produccion Flor - AdminWeb</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-guard.js?v=20260629-supabase-only"></script>
  <script src="produccion-data.js?v=20260718-social-copy"></script>
  <style>
    :root { --bg:#f5f7fb; --panel:#fff; --text:#111827; --muted:#64748b; --line:#e2e8f0; --ink:#0f172a; --brand:#0f766e; --blue:#2563eb; --warn:#b45309; --ok:#15803d; --danger:#b91c1c; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif; background:linear-gradient(180deg,rgba(37,99,235,.08),transparent 260px),var(--bg); color:var(--text); }
    .shell { width:min(1320px,calc(100% - 32px)); margin:0 auto; padding:24px 0 56px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; }
    .brand { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--ink); font-weight:950; }
    .brand-icon { display:grid; place-items:center; width:38px; height:38px; border-radius:8px; background:var(--ink); color:#fff; }
    .nav { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; }
    .nav a, .button { min-height:38px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line); border-radius:8px; padding:9px 12px; background:#fff; color:#334155; text-decoration:none; font:850 13px/1.2 inherit; cursor:pointer; }
    .button.primary { background:var(--ink); border-color:var(--ink); color:#fff; }
    .hero { display:grid; grid-template-columns:minmax(0,1fr) 360px; gap:18px; margin-bottom:18px; }
    .panel { border:1px solid var(--line); border-radius:8px; background:rgba(255,255,255,.94); box-shadow:0 18px 45px rgba(15,23,42,.08); padding:22px; }
    .eyebrow { margin:0 0 10px; color:var(--brand); font-size:12px; font-weight:950; letter-spacing:.12em; text-transform:uppercase; }
    h1 { margin:0; color:var(--ink); font-size:clamp(34px,5vw,60px); line-height:.98; }
    p { color:var(--muted); line-height:1.55; }
    .kpis { display:grid; gap:10px; }
    .kpi { display:flex; justify-content:space-between; gap:12px; border:1px solid var(--line); border-radius:8px; padding:12px; background:#f8fafc; }
    .kpi span { color:var(--muted); font-weight:850; font-size:13px; }
    .kpi strong { color:var(--ink); font-size:22px; }
    .toolbar { display:grid; grid-template-columns:minmax(240px,1fr) auto auto; gap:10px; margin-bottom:14px; }
    input, select { width:100%; min-height:40px; border:1px solid var(--line); border-radius:8px; padding:10px 12px; background:#fff; font:inherit; }
    .op-board { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; }
    .op-card { min-height:330px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid var(--line); border-radius:8px; padding:18px; background:#fff; box-shadow:0 14px 32px rgba(15,23,42,.07); color:inherit; text-decoration:none; }
    .op-card h2 { margin:14px 0 8px; color:var(--ink); font-size:24px; line-height:1.1; }
    .op-card p { margin:0; }
    .badge-row { display:flex; flex-wrap:wrap; gap:8px; }
    .badge { display:inline-flex; width:max-content; border-radius:999px; padding:6px 10px; background:#eef2ff; color:#3730a3; font-size:12px; font-weight:950; }
    .badge.pending { background:#fef3c7; color:var(--warn); } .badge.design { background:#dbeafe; color:#1d4ed8; } .badge.review { background:#ede9fe; color:#6d28d9; } .badge.scheduled { background:#ccfbf1; color:#0f766e; } .badge.high { background:#fee2e2; color:var(--danger); } .badge.done { background:#dcfce7; color:var(--ok); }
    .meta { display:grid; gap:8px; margin-top:18px; }
    .empty { display:none; border:1px dashed #cbd5e1; border-radius:8px; padding:22px; background:#fff; color:var(--muted); text-align:center; font-weight:850; }
    @media (max-width:1100px) { .op-board { grid-template-columns:repeat(2,minmax(0,1fr)); } .hero { grid-template-columns:1fr; } }
    @media (max-width:680px) { .shell { width:min(100% - 22px,1320px); } .topbar { align-items:flex-start; flex-direction:column; } .toolbar,.op-board { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="produccion-flor.html"><span class="brand-icon">IX</span><span>Centro de Produccion Ixmati</span></a>
      <nav class="nav">
        <a href="produccion-flor.html" aria-current="page">Tablero</a>
        <a href="calendario-produccion.html">Calendario</a>
      </nav>
    </header>

    <section class="hero">
      <div class="panel">
        <p class="eyebrow">Tablero de trabajo</p>
        <h1>Produccion Flor</h1>
        <p>Cards de carruseles en produccion. Cada tarjeta abre su documento propio para ver copy, slides, estado, archivos y aprobacion.</p>
      </div>
      <aside class="panel">
        <p class="eyebrow">Resumen</p>
        <div class="kpis">
          <div class="kpi"><span>OPs activas</span><strong id="totalOps">0</strong></div>
          <div class="kpi"><span>En aprobacion</span><strong id="reviewOps">0</strong></div>
          <div class="kpi"><span>Aprobadas</span><strong id="approvedOps">0</strong></div>
        </div>
      </aside>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="Buscar OP, objetivo, formato...">
      <select id="statusFilter">
        <option value="all">Todos los estados</option>
      </select>
      <select id="priorityFilter">
        <option value="all">Todas las prioridades</option>
        <option value="Alta">Alta</option>
        <option value="Media">Media</option>
      </select>
    </section>

    <section class="op-board" id="opBoard"></section>
    <div class="empty" id="emptyState">No hay OPs con esos filtros.</div>
  </main>

  <script>
    (function () {
      var api = window.IxmatiProduction;
      var statusFilter = document.getElementById("statusFilter");
      api.statuses.forEach(function (status) {
        var option = document.createElement("option");
        option.value = status;
        option.textContent = status;
        statusFilter.appendChild(option);
      });

      function render() {
        var query = normalize(document.getElementById("searchInput").value);
        var status = document.getElementById("statusFilter").value;
        var priority = document.getElementById("priorityFilter").value;
        var ops = api.allOps().filter(function (op) {
          var current = api.currentStatus(op);
          var haystack = normalize([op.id, op.title, op.objective, op.format, op.priority, op.platform, op.type, op.dueDate].join(" "));
          return (status === "all" || current === status) && (priority === "all" || op.priority === priority) && (!query || haystack.indexOf(query) !== -1);
        });
        document.getElementById("opBoard").innerHTML = ops.map(renderCard).join("");
        document.getElementById("emptyState").style.display = ops.length ? "none" : "block";
        updateStats();
      }

      function renderCard(op) {
        var state = api.opState(op.id);
        var current = api.currentStatus(op);
        var deliveries = state.deliveries || [];
        var href = op.page || ("op-detalle.html?id=" + encodeURIComponent(op.id));
        return [
          '<a class="op-card" href="' + href + '">',
          '<div>',
          '<div class="badge-row"><span class="badge">' + op.id + '</span><span class="badge ' + api.statusClass(current) + '">' + current + '</span><span class="badge">' + op.priority + '</span></div>',
          '<h2>' + op.title + '</h2>',
          '<p>' + op.objective + '</p>',
          '</div>',
          '<div class="meta">',
          (op.dueDate ? '<p>Fecha: <strong>' + op.dueDate + '</strong></p>' : ''),
          (op.platform ? '<p>Canal: <strong>' + op.platform + '</strong></p>' : ''),
          '<p><strong>' + op.type + '</strong> - ' + op.pieces + '</p>',
          '<p>Formato: <strong>' + op.format + '</strong></p>',
          '<p>Entregables: <strong>' + deliveries.length + '</strong></p>',
          '<span class="button primary">Abrir documento</span>',
          '</div>',
          '</a>'
        ].join("");
      }

      function updateStats() {
        var ops = api.allOps();
        document.getElementById("totalOps").textContent = ops.length;
        document.getElementById("reviewOps").textContent = ops.filter(function (op) { return api.currentStatus(op) === "Enviado a aprobacion"; }).length;
        document.getElementById("approvedOps").textContent = ops.filter(function (op) { return api.currentStatus(op) === "Aprobado" || api.currentStatus(op) === "Publicado"; }).length;
      }

      function normalize(value) {
        return String(value || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      }

      document.getElementById("searchInput").addEventListener("input", render);
      document.getElementById("statusFilter").addEventListener("change", render);
      document.getElementById("priorityFilter").addEventListener("change", render);
      api.ready(function () {
        if (api.remoteError && api.remoteError()) {
          document.getElementById("opBoard").innerHTML = '<div class="empty">' + api.remoteError() + '</div>';
          document.getElementById("emptyState").style.display = "none";
          return;
        }
        render();
      });
    })();
  </script>
</body>
</html>
