<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CMS OP</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="auth-guard.js?v=20260629-supabase-only"></script><script src="produccion-data.js?v=20260718-delay-2d"></script><link rel="stylesheet" href="su-admin.css"><style>
:root{--bg:#f6f7fb;--line:#e2e8f0;--ink:#0f172a;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:24px 0 56px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.topbar a{color:#1d4ed8;font-weight:900;text-decoration:none}.grid{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:16px}.panel,.op{border:1px solid var(--line);border-radius:8px;background:#fff;padding:18px;box-shadow:0 12px 32px rgba(15,23,42,.06)}h1{margin:0;font-size:44px}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font:inherit}.form{display:grid;gap:10px}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.button{border:0;border-radius:8px;background:#111827;color:#fff;padding:11px 14px;font-weight:900;cursor:pointer}.stack{display:grid;gap:10px}.op p{color:var(--muted)}@media(max-width:900px){.grid,.row{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}</style></head>
<body><main class="shell"><header class="su-topbar"><a class="su-brand" href="admin-su.html"><span>SU</span><strong>SuperSU Ixmati</strong></a><nav class="su-menu"><a href="admin-su.html">Inicio SU</a><a href="progreso-estudiantes.html">Estudiantes</a><a href="produccion-admin.html">Produccion</a><a href="calendario-produccion.html">Calendario</a><a href="cms-op.html" aria-current="page">CMS OPs</a></nav></header><section class="su-page-head"><div><h1>CMS de OPs</h1><p>Crear trabajo nuevo para Flor: carruseles, posts, stories, reels, banners o impresos.</p></div></section><section class="grid"><div class="panel"><h2>Nueva OP</h2><div class="form"><input id="title" placeholder="Titulo"><div class="row"><select id="type"><option>Carrusel</option><option>Post</option><option>Story</option><option>Reel</option><option>Flyer</option><option>Banner</option></select><select id="platform"><option>Instagram</option><option>Facebook</option><option>TikTok</option><option>WhatsApp</option><option>Web</option><option>Impresion</option><option>Multiplataforma</option></select></div><div class="row"><select id="priority"><option>Alta</option><option>Media</option></select><input id="format" value="1080x1350" placeholder="Formato"></div><input id="pieces" placeholder="Cantidad de piezas"><textarea id="objective" rows="3" placeholder="Objetivo"></textarea><textarea id="items" rows="9" placeholder="Piezas una por linea: Pieza 1 | Titulo | Texto | Visual/indicaciones"></textarea><button class="button" id="save">Crear OP</button></div></div><aside class="panel"><h2>OPs creadas</h2><div class="stack" id="ops"></div></aside></section></main><script>
(function(){var api=window.IxmatiProduction;function render(){document.getElementById('ops').innerHTML=api.allOps().map(function(op){return '<div class="op"><strong>'+op.id+' - '+op.title+'</strong><p>'+op.type+' / '+(op.platform||'Multi')+' / '+api.currentStatus(op)+'</p></div>'}).join('')}document.getElementById('save').onclick=function(){var title=document.getElementById('title').value.trim();if(!title)return;var custom=api.readCustomOps();var id=api.nextOpId();var items=document.getElementById('items').value.split('\\n').filter(Boolean).map(function(line){var p=line.split('|').map(function(x){return x.trim()});return{title:p[1]||p[0]||'Pieza',text:p[2]||'Texto pendiente',visual:p[3]||'Visual pendiente'}});custom.push({id:id,page:'op-detalle.html?id='+id,type:document.getElementById('type').value,platform:document.getElementById('platform').value,title:title,status:'Pendiente',priority:document.getElementById('priority').value,format:document.getElementById('format').value||'1080x1350',pieces:document.getElementById('pieces').value||((items.length||1)+' piezas'),objective:document.getElementById('objective').value||'Objetivo pendiente.',cta:'CTA pendiente.',refs:['Referencia pendiente'],slides:items.length?items:[{title:'Pieza 1',text:'Texto pendiente',visual:'Visual pendiente'}]});api.writeCustomOps(custom);['title','objective','items','pieces'].forEach(function(id){document.getElementById(id).value=''});render()};api.ready(render)})();
</script></body></html>
