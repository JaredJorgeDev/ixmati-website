<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ixmati AdminWeb - Login</title>
  <style>
    :root {
      color-scheme: light;
      --bg-1: #0b1220;
      --bg-2: #1f2937;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --error: #dc2626;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top right, #1e3a8a 0%, transparent 40%),
                  linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      padding: 20px;
    }
    .card {
      width: min(420px, 100%);
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(2, 6, 23, .4);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: .95rem;
    }
    label {
      display: block;
      margin: 0 0 6px;
      font-size: .9rem;
      font-weight: 600;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: .95rem;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 2px 0 16px;
      font-size: .9rem;
      color: var(--muted);
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: .95rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      cursor: pointer;
    }
    .error {
      margin: 12px 0 0;
      min-height: 20px;
      color: var(--error);
      font-size: .88rem;
      font-weight: 600;
    }
    .hint {
      margin-top: 14px;
      font-size: .8rem;
      color: var(--muted);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-academia.js?v=20260624-flor2"></script>
  <script src="auth-guard.js?v=20260629-supabase-only"></script>
</head>
<body>
  <main class="card" aria-labelledby="login-title">
    <h1 id="login-title">Ixmati AdminWeb</h1>
    <p>Acceso exclusivo para administradores.</p>

    <form id="loginForm" autocomplete="off">
      <label for="username">Usuario</label>
      <input id="username" name="username" type="text" required>

      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required>

      <div class="row">
        <label style="margin:0; display:flex; gap:8px; align-items:center; font-weight:500;">
          <input id="remember" type="checkbox"> Recordarme
        </label>
      </div>

      <button type="submit">Entrar</button>
      <div id="error" class="error" role="alert" aria-live="polite"></div>
    </form>

    <div class="hint">Ruta de acceso: <strong>/adminweb</strong></div>
  </main>

  <script>
    (function () {
      var form = document.getElementById("loginForm");
      var error = document.getElementById("error");
      var next = new URLSearchParams(window.location.search).get("next");

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        error.textContent = "";

        var username = document.getElementById("username").value.trim();
        var password = document.getElementById("password").value;
        var remember = document.getElementById("remember").checked;

        Promise.resolve(window.AdminWebAuth && window.AdminWebAuth.login(username, password, remember)).then(function (ok) {
          if (ok === "supabase_auth_failed") {
            error.textContent = "Supabase no acepto esta cuenta. Revisa que el usuario exista en Supabase y tenga la misma contrasena.";
            return;
          }
          if (!ok) {
            error.textContent = "Usuario o contraseña incorrectos.";
            return;
          }

          var user = window.AdminWebAuth && window.AdminWebAuth.currentUser && window.AdminWebAuth.currentUser();
          if (user && user.role === "flor") {
            window.location.href = "produccion-flor.html";
            return;
          }

          window.location.href = (window.AdminWebAuth && window.AdminWebAuth.safeNext(next)) || "index.html";
        });
      });
    })();
  </script>
</body>
</html>
