<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Produccion Admin</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="auth-guard.js?v=20260629-supabase-only"></script><script src="produccion-data.js?v=20260708-one-per-day"></script><link rel="stylesheet" href="su-admin.css"><style>
:root{--bg:#f6f7fb;--line:#e2e8f0;--ink:#0f172a;--muted:#64748b;--ok:#15803d;--warn:#b45309}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}.shell{width:min(1280px,calc(100% - 32px));margin:0 auto;padding:24px 0 56px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.topbar a{color:#1d4ed8;font-weight:900;text-decoration:none}.grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:16px}.panel,.card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:18px;box-shadow:0 12px 32px rgba(15,23,42,.06)}h1{margin:0;font-size:44px}.stack{display:grid;gap:12px}.row{display:flex;justify-content:space-between;gap:12px}.badge{border-radius:999px;background:#eef2ff;color:#3730a3;padding:6px 10px;font-size:12px;font-weight:950}.badge.ok{background:#dcfce7;color:var(--ok)}.badge.warn{background:#fef3c7;color:var(--warn)}textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit}.actions{display:flex;gap:8px;flex-wrap:wrap}.button{border:1px solid var(--line);border-radius:8px;background:#fff;padding:9px 12px;font-weight:900;cursor:pointer}.button.primary{background:#111827;color:#fff}.files{display:grid;gap:6px;margin:8px 0}.files a{color:#1d4ed8;font-weight:900}@media(max-width:900px){.grid{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}</style></head>
<body><main class="shell"><header class="su-topbar"><a class="su-brand" href="admin-su.html"><span>SU</span><strong>SuperSU Ixmati</strong></a><nav class="su-menu"><a href="admin-su.html">Inicio SU</a><a href="progreso-estudiantes.html">Estudiantes</a><a href="produccion-admin.html" aria-current="page">Produccion</a><a href="calendario-produccion.html">Calendario</a><a href="cms-op.html">CMS OPs</a></nav></header><section class="su-page-head"><div><h1>Produccion Admin</h1><p>Revisar entregables de Flor y aprobar o pedir cambios.</p></div></section><section class="grid"><div class="panel"><h2>Aprobacion de contenido</h2><div class="stack" id="approval"></div></div><aside class="panel"><h2>OPs activas</h2><div class="stack" id="ops"></div></aside></section></main><script>
(function(){var api=window.IxmatiProduction;function render(){renderOps();renderApprovals()}function renderOps(){document.getElementById("ops").innerHTML=api.allOps().filter(function(op){return api.currentStatus(op)!=="Cambios solicitados"}).map(function(op){var st=api.currentStatus(op);var href=op.page||('op-detalle.html?id='+op.id);return '<a class="su-op-card" href="'+href+'"><div><div class="row"><span class="badge">'+op.id+'</span><span class="badge">'+st+'</span></div><h3>'+op.title+'</h3><p>'+op.objective+'</p></div><div class="op-meta"><span>'+(op.dueDate||'Sin fecha')+'</span><span>'+op.type+'</span><span>'+(op.platform||'Multi')+'</span><span>'+op.format+'</span><span>'+op.pieces+'</span></div><span class="op-open">Abrir OP</span></a>'}).join("")}function renderApprovals(){var state=api.readState();var rows=[];Object.keys(state).forEach(function(id){(state[id].deliveries||[]).forEach(function(d,i){if(d.status!=='Aprobado'&&d.status!=='Cambios solicitados')rows.push({id:id,index:i,d:d})})});var wrap=document.getElementById("approval");if(!rows.length){wrap.innerHTML='<p>No hay entregables pendientes.</p>';return}wrap.innerHTML=rows.map(function(r){return '<article class="card" data-op="'+r.id+'" data-index="'+r.index+'"><div class="row"><h3>'+r.id+' entrega '+(r.index+1)+'</h3><span class="badge warn">'+r.d.status+'</span></div>'+files(r.d.files)+'<p>'+(r.d.notes||'Sin notas')+'</p><textarea rows="3" placeholder="Comentarios">'+(r.d.approvalNote||'')+'</textarea><div class="actions"><button class="button primary" data-approve>Aprobar</button><button class="button" data-changes>Pedir cambios</button></div></article>'}).join("");Array.prototype.forEach.call(wrap.querySelectorAll('.card'),function(card){card.querySelector('[data-approve]').onclick=function(){update(card,'Aprobado')};card.querySelector('[data-changes]').onclick=function(){update(card,'Cambios solicitados')}})}function update(card,status){var state=api.readState();var id=card.getAttribute('data-op');var i=Number(card.getAttribute('data-index'));state[id].deliveries[i].status=status;state[id].deliveries[i].approvalNote=card.querySelector('textarea').value;state[id].status=status;api.writeState(state).then(function(ok){if(api.supabaseEnabled&&!ok){window.alert('No se pudo guardar la revision en Supabase. Revisa las politicas SQL y vuelve a intentar.');return}render()})}function files(list){if(!list||!list.length)return'<p>Sin archivos.</p>';return'<div class="files">'+list.map(function(f){return f.data?'<a href="'+f.data+'" download="'+f.name+'">'+f.name+'</a>':'<span>'+f.name+'</span>'}).join('')+'</div>'}api.ready(function(){if(api.remoteError&&api.remoteError()){document.getElementById("approval").innerHTML="<p>"+api.remoteError()+"</p>";document.getElementById("ops").innerHTML="";return}render()})})();
</script></body></html>
