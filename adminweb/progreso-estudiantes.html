<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Progreso Estudiantes</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-academia.js?v=20260624-flor2"></script>
  <script src="auth-guard.js?v=20260629-supabase-only"></script><link rel="stylesheet" href="su-admin.css"><style>
:root{--bg:#f6f7fb;--line:#e2e8f0;--ink:#0f172a;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}.shell{width:min(1280px,calc(100% - 32px));margin:0 auto;padding:24px 0 56px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.topbar a{color:#1d4ed8;font-weight:900;text-decoration:none}.panel,.student,.review-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:18px;box-shadow:0 12px 32px rgba(15,23,42,.06)}h1{margin:0;font-size:44px}.grid{display:grid;gap:12px}.student-head{display:flex;justify-content:space-between;gap:12px}.modules{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.module{border:1px solid var(--line);border-radius:8px;padding:10px;background:#f8fafc;font-size:13px}.meter{height:8px;border-radius:999px;background:#e2e8f0;overflow:hidden;margin:8px 0}.meter span{display:block;height:100%;background:linear-gradient(90deg,#0f766e,#2563eb)}.badge{border-radius:999px;background:#eef2ff;color:#3730a3;padding:6px 10px;font-size:12px;font-weight:950}.admin-grid{display:grid;grid-template-columns:minmax(0,1fr) 420px;gap:14px}.review-card{display:grid;gap:10px}.review-card textarea,.review-card input,.review-card select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit}.actions{display:flex;gap:8px;flex-wrap:wrap}.button{border:0;border-radius:8px;background:#111827;color:#fff;padding:10px 12px;font-weight:900;cursor:pointer}@media(max-width:1000px){.admin-grid{grid-template-columns:1fr}}@media(max-width:900px){.modules{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}</style></head>
<body><main class="shell"><header class="su-topbar"><a class="su-brand" href="admin-su.html"><span>SU</span><strong>SuperSU Ixmati</strong></a><nav class="su-menu"><a href="admin-su.html">Inicio SU</a><a href="progreso-estudiantes.html" aria-current="page">Estudiantes</a><a href="produccion-admin.html">Produccion</a><a href="cms-op.html">CMS OPs</a></nav></header><section class="su-page-head"><div><h1>Progreso de estudiantes</h1><p>Avance por estudiante, modulo, evaluacion y entregas practicas.</p></div></section><section class="admin-grid"><div class="grid" id="students"></div><aside class="grid"><section class="panel"><h2>Pendientes de revision</h2><div class="grid" id="submissions"></div></section></aside></section></main><script>
(function(){var academy=window.IxmatiAcademySupabase;var students=["flor","karen","xochitl","adan","jadith"];var modules=[{id:"estudio-visual",title:"Estudio Visual",lessons:6},{id:"web",title:"Web",lessons:4},{id:"marketing",title:"Marketing",lessons:4},{id:"comercial",title:"Comercial",lessons:4},{id:"operacion",title:"Operacion",lessons:4}];function read(k){try{return JSON.parse(localStorage.getItem(k)||"{}")}catch(e){return{}}}function pct(m,item){item=item||{};var done=Object.keys(item.lessons||{}).filter(function(k){return item.lessons[k]}).length;return Math.min(100,Math.round((done/m.lessons)*45)+(item.practiceDone?20:0)+(item.exam?Math.round((item.exam.percentage/100)*35):0))}function localRender(){document.getElementById("students").innerHTML=students.map(function(s){var p=read("ixmati_academia_progress_v2_"+s);var sum=0,approved=0;var mods=modules.map(function(m){var item=p[m.id]||{};var percent=pct(m,item);sum+=percent;if(item.exam&&item.exam.approved)approved++;return '<div class="module"><strong>'+m.title+'</strong><div class="meter"><span style="width:'+percent+'%"></span></div>'+percent+'%'+(item.exam?' / examen '+item.exam.percentage+'%':'')+'</div>'}).join("");var avg=Math.round(sum/modules.length);return '<article class="student"><div class="student-head"><h2>'+s+'</h2><span class="badge">'+approved+'/'+modules.length+' aprobados</span></div><div class="meter"><span style="width:'+avg+'%"></span></div><p>Progreso general: <strong>'+avg+'%</strong></p><div class="modules">'+mods+'</div></article>'}).join("");document.getElementById("submissions").innerHTML='<p>Configura Supabase para revisar entregas aqui.</p>'}function remoteRender(data){var byUser={};data.profiles.forEach(function(p){byUser[p.id]={profile:p,lessons:{},approved:0,attempts:[]}});data.progress.forEach(function(row){if(!byUser[row.user_id])return;var mod=row.lessons&&row.lessons.modules&&row.lessons.modules.slug;if(!mod)return;byUser[row.user_id].lessons[mod]=(byUser[row.user_id].lessons[mod]||0)+1});data.attempts.forEach(function(row){if(!byUser[row.user_id])return;byUser[row.user_id].attempts.push(row);if(row.passed)byUser[row.user_id].approved+=1});document.getElementById("students").innerHTML=Object.keys(byUser).map(function(id){var item=byUser[id];var sum=0;var mods=modules.map(function(m){var lessonPct=Math.round(((item.lessons[m.id]||0)/m.lessons)*45);var attempts=item.attempts.filter(function(a){return a.quizzes&&a.quizzes.modules&&a.quizzes.modules.slug===m.id});var best=attempts.reduce(function(max,a){return Math.max(max,a.score||0)},0);var percent=Math.min(100,lessonPct+(best?Math.round((best/100)*35):0));sum+=percent;return '<div class="module"><strong>'+m.title+'</strong><div class="meter"><span style="width:'+percent+'%"></span></div>'+percent+'%'+(best?' / examen '+best+'%':'')+'</div>'}).join("");var avg=Math.round(sum/modules.length);return '<article class="student"><div class="student-head"><h2>'+(item.profile.full_name||item.profile.email)+'</h2><span class="badge">'+item.approved+' evaluaciones aprobadas</span></div><div class="meter"><span style="width:'+avg+'%"></span></div><p>Progreso general: <strong>'+avg+'%</strong></p><div class="modules">'+mods+'</div></article>'}).join("")||'<div class="panel">No hay alumnos todavia.</div>';renderSubmissions(data.submissions)}function renderSubmissions(rows){var pending=rows.filter(function(row){return row.status==="submitted"||row.status==="requiere_correccion"});document.getElementById("submissions").innerHTML=(pending.length?pending:rows).map(function(row){var content=typeof row.content==="object"?row.content:{text:row.content};return '<article class="review-card" data-id="'+row.id+'"><strong>'+(row.profiles.full_name||row.profiles.email)+'</strong><p>'+(row.activities.modules.title||row.activities.modules.slug)+' / '+row.activities.title+'</p><p>'+(content.text||'Sin texto')+'</p>'+(content.link?'<a href="'+content.link+'" target="_blank" rel="noopener">Abrir link</a>':'')+'<select data-status><option value="aprobado">Aprobado</option><option value="rechazado">Rechazado</option><option value="requiere_correccion">Requiere correccion</option></select><input data-grade type="number" min="0" max="100" placeholder="Calificacion"><textarea data-feedback rows="3" placeholder="Feedback para el alumno">'+(row.feedback||'')+'</textarea><button class="button" data-review>Guardar revision</button></article>'}).join("")||'<p>No hay entregas pendientes.</p>';Array.prototype.forEach.call(document.querySelectorAll("[data-review]"),function(btn){btn.addEventListener("click",function(){var card=btn.closest(".review-card");academy.reviewSubmission(card.getAttribute("data-id"),{status:card.querySelector("[data-status]").value,grade:card.querySelector("[data-grade]").value,feedback:card.querySelector("[data-feedback]").value}).then(function(){btn.textContent="Guardado"})})})}if(academy&&academy.enabled){academy.listAdminData().then(function(data){if(data)remoteRender(data);else localRender()})}else{localRender()}})();
</script></body></html>
