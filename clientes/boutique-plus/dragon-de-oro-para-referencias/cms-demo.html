<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS privado demo | Dragón de Oro</title>
  <link rel="icon" type="image/jpeg" href="/clientes/logoixmati.jpg" />
  <script src="../portal-auth.js"></script>
  <style>
    :root{--bg:#f7f0f2;--surface:#fff;--ink:#2f2025;--muted:#6e5d63;--line:#e5d5da;--brand:#b63a4a;--deep:#8f2d39;--gold:#caa46a;--ok:#2f8f63;--warn:#b58536;--off:#8f6972}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Avenir Next","Segoe UI",sans-serif;overflow-x:hidden}.wrap{width:min(1280px,95vw);margin:0 auto}
    .app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}.side{background:#fff;border-right:1px solid var(--line);padding:14px;position:sticky;top:0;height:100vh}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;margin-bottom:10px}.logo{width:42px;height:42px;border-radius:10px;border:1px solid #dec8ce;object-fit:cover;background:#fff}
    .menu{display:grid;gap:6px}.menu a{padding:9px 10px;border-radius:10px;text-decoration:none;color:var(--ink);font-weight:700}.menu a.active,.menu a:hover{background:#fff1f4;color:var(--deep)}
    .main{padding:14px;min-width:0}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}
    .status{display:flex;gap:8px;flex-wrap:wrap}.pill{border-radius:999px;padding:4px 9px;font-size:.75rem;font-weight:800}.on{background:#e8f7ef;color:var(--ok)}
    .btn{border:1px solid transparent;border-radius:999px;padding:9px 13px;font:inherit;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}.btn.primary{background:var(--brand);color:#fff}.btn.outline{background:#fff;color:var(--deep);border-color:#dfc8ce}
    .kpis{display:grid;grid-template-columns:repeat(6,minmax(100px,1fr));gap:10px;margin:12px 0}.kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px}.kpi strong{display:block;font-size:1.45rem;margin-top:4px}
    .layout{display:grid;grid-template-columns:minmax(0,360px) minmax(0,1fr) minmax(0,320px);gap:12px}.panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;min-width:0}
    .form{display:grid;gap:9px}.form label{display:grid;gap:5px;color:var(--muted);font-weight:700}input,select,textarea{width:100%;border:1px solid #dfccd1;border-radius:10px;padding:10px 11px;font:inherit;background:#fff}textarea{min-height:88px;resize:vertical}
    .toolbar{display:grid;grid-template-columns:1fr 170px 170px;gap:8px;margin-bottom:10px}
    .list{display:grid;gap:8px;max-height:640px;overflow:auto}.row{border:1px solid #e8d7dc;border-radius:10px;background:#fffaf9;padding:10px}.row-top{display:flex;justify-content:space-between;gap:8px}
    .s{border-radius:999px;padding:3px 8px;font-size:.72rem;font-weight:800}.s-disponible{background:#e8f7ef;color:var(--ok)}.s-ultimas-piezas{background:#fff3df;color:var(--warn)}.s-agotado{background:#f4e5e8;color:var(--off)}
    .act{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.act button{border:1px solid #dfc7cd;background:#fff;border-radius:8px;padding:6px 8px;font-weight:700;cursor:pointer}
    .preview-card{border:1px solid #e7d6db;border-radius:12px;overflow:hidden;background:#fff}.ph{height:120px;display:grid;place-items:center;font-size:2.2rem;background:linear-gradient(135deg,#fbe8eb,#fff3df)}.pb{padding:12px}
    .toast{position:fixed;right:16px;bottom:16px;background:#2f8f63;color:#fff;padding:10px 12px;border-radius:10px;font-weight:700;display:none;z-index:99}.toast.show{display:block}
    @media(max-width:1120px){.app{grid-template-columns:1fr}.side{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}.layout{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><img class="logo" src="logo dragon.png" alt="Logo Dragón de Oro" />Dragón de Oro</div>
      <nav class="menu">
        <a class="active" href="#">Dashboard</a><a href="#">Productos</a><a href="#">Inventario</a><a href="#">Pedidos</a><a href="#">Categorías</a><a href="#">Configuración</a>
      </nav>
    </aside>

    <main class="main">
      <header class="top">
        <div>
          <h2 style="margin:0">Panel privado de productos</h2>
          <div class="status"><span class="pill on">Sistema activo</span><span class="pill" id="clock" style="background:#fff3df;color:#8a6325">--:--</span></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a class="btn outline" href="index.html">Volver a cotización</a>
          <a class="btn outline" href="tienda-demo.html">Ver tienda</a>
          <button id="resetDemo" class="btn primary" type="button">Restaurar demo</button>
        </div>
      </header>

      <section class="kpis">
        <article class="kpi"><span>Productos activos</span><strong id="kActive">0</strong></article>
        <article class="kpi"><span>Últimas piezas</span><strong id="kLast">0</strong></article>
        <article class="kpi"><span>Agotados</span><strong id="kOut">0</strong></article>
        <article class="kpi"><span>Destacados</span><strong id="kFeat">0</strong></article>
        <article class="kpi"><span>Pedidos demo hoy</span><strong id="kOrders">0</strong></article>
        <article class="kpi"><span>Categorías</span><strong id="kCats">0</strong></article>
      </section>

      <section class="layout">
        <aside class="panel">
          <h3>Formulario de producto</h3>
          <form id="form" class="form">
            <label>Nombre del producto<input id="name" required /></label>
            <label>Precio<input id="price" type="number" min="1" required /></label>
            <label>Categoría<select id="category"><option>Bolsas</option><option>Hogar</option><option>Papelería</option><option>Belleza</option><option>Novedades</option><option>Ofertas</option></select></label>
            <label>Disponibilidad<select id="availability"><option>Disponible</option><option>Últimas piezas</option><option>Agotado</option></select></label>
            <label>Descripción<textarea id="description" required></textarea></label>
            <label>Foto simulada / icono visual<input id="icon" value="✨" maxlength="2" /></label>
            <label>Producto destacado<select id="featured"><option value="false">No</option><option value="true">Sí</option></select></label>
            <button id="submitBtn" class="btn primary" type="submit">Publicar producto demo</button>
          </form>
        </aside>

        <section class="panel">
          <h3>Lista de productos</h3>
          <div class="toolbar">
            <input id="adminSearch" placeholder="Buscar producto..." />
            <select id="adminCat"><option value="Todo">Categoría: Todo</option><option>Bolsas</option><option>Hogar</option><option>Papelería</option><option>Belleza</option><option>Novedades</option><option>Ofertas</option></select>
            <select id="adminStock"><option value="Todos">Estado: Todos</option><option>Disponible</option><option>Últimas piezas</option><option>Agotado</option></select>
          </div>
          <div id="list" class="list"></div>
        </section>

        <aside class="panel">
          <h3>Vista previa</h3>
          <article id="preview" class="preview-card"></article>
        </aside>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const KEYS = { products: "ddo_products", cart: "ddo_cart", orders: "ddo_orders" };
    const baseProducts = [
      { id: 1, name: "Bolsa tornasol importada", category: "Bolsas", price: 249, availability: "Disponible", description: "Bolsa importada con acabado tornasol.", featured: true, icon: "👜", tags:["Nuevo","Viral"] },
      { id: 2, name: "Termo kawaii", category: "Hogar", price: 179, availability: "Últimas piezas", description: "Termo térmico con diseño kawaii.", featured: false, icon: "🥤", tags:["Últimas piezas"] },
      { id: 3, name: "Libreta Sanrio", category: "Papelería", price: 89, availability: "Disponible", description: "Libreta de pasta dura para uso diario.", featured: false, icon: "📒", tags:["Nuevo"] },
      { id: 4, name: "Set de vasos coreanos", category: "Hogar", price: 199, availability: "Disponible", description: "Set decorativo importado.", featured: false, icon: "🥛", tags:[] },
      { id: 5, name: "Cosmetiquera importada", category: "Belleza", price: 129, availability: "Disponible", description: "Cosmetiquera resistente.", featured: false, icon: "👝", tags:[] },
      { id: 6, name: "Organizador de maquillaje", category: "Belleza", price: 159, availability: "Últimas piezas", description: "Organizador modular.", featured: false, icon: "💄", tags:["Últimas piezas"] },
      { id: 7, name: "Llavero sorpresa", category: "Novedades", price: 59, availability: "Disponible", description: "Llavero sorpresa colección.", featured: false, icon: "🔑", tags:["Viral"] },
      { id: 8, name: "Mochila escolar importada", category: "Bolsas", price: 299, availability: "Disponible", description: "Mochila con compartimentos.", featured: false, icon: "🎒", tags:["Nuevo"] },
      { id: 9, name: "Lámpara decorativa", category: "Hogar", price: 219, availability: "Disponible", description: "Lámpara de mesa decorativa.", featured: false, icon: "🛋️", tags:[] },
      { id: 10, name: "Plumas gel kawaii", category: "Papelería", price: 49, availability: "Disponible", description: "Set de plumas gel.", featured: false, icon: "🖊️", tags:["Viral"] },
      { id: 11, name: "Cepillo facial mini", category: "Belleza", price: 139, availability: "Disponible", description: "Cepillo mini facial.", featured: false, icon: "🧴", tags:[] },
      { id: 12, name: "Producto viral del live", category: "Novedades", price: 99, availability: "Agotado", description: "Producto viral mostrado en live.", featured: true, icon: "✨", tags:["Viral","Agotado"] },
      { id: 13, name: "Kit oferta hogar", category: "Ofertas", price: 149, availability: "Disponible", description: "Paquete con precio de temporada.", featured: false, icon: "🏷️", tags:["Nuevo"] }
    ];

    const loadProducts = () => {
      const raw = localStorage.getItem(KEYS.products);
      if (raw) { try { const p = JSON.parse(raw); if (Array.isArray(p) && p.length) return p; } catch {} }
      localStorage.setItem(KEYS.products, JSON.stringify(baseProducts));
      return [...baseProducts];
    };

    let products = loadProducts();
    let editId = null;
    const f = id => document.getElementById(id);
    const money = n => new Intl.NumberFormat("es-MX", { style:"currency", currency:"MXN" }).format(Number(n||0));
    const toast = msg => { const t = f("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 1700); };
    const persist = () => localStorage.setItem(KEYS.products, JSON.stringify(products));

    function renderClock() {
      const now = new Date();
      f("clock").textContent = `${now.toLocaleDateString("es-MX")} · ${now.toLocaleTimeString("es-MX", { hour:"2-digit", minute:"2-digit" })}`;
    }
    setInterval(renderClock, 30000); renderClock();

    function rowClass(s) { return `s-${s.toLowerCase().replace(/\s+/g, "-")}`; }

    function stats() {
      const active = products.filter(p => p.availability !== "Agotado").length;
      const last = products.filter(p => p.availability === "Últimas piezas").length;
      const out = products.filter(p => p.availability === "Agotado").length;
      const feat = products.filter(p => p.featured).length;
      const cats = new Set(products.map(p => p.category)).size;
      const today = new Date().toISOString().slice(0,10);
      const orders = JSON.parse(localStorage.getItem(KEYS.orders) || "[]");
      const todayOrders = orders.filter(o => (o.createdAt || "").slice(0,10) === today).length;
      f("kActive").textContent = String(active); f("kLast").textContent = String(last); f("kOut").textContent = String(out); f("kFeat").textContent = String(feat); f("kCats").textContent = String(cats); f("kOrders").textContent = String(todayOrders);
    }

    function preview(data) {
      const d = data || readForm();
      f("preview").innerHTML = `<div class="ph">${d.icon || "✨"}</div><div class="pb"><h4 style="margin:0 0 6px">${d.name || "Producto demo"}</h4><p style="margin:0 0 6px;color:var(--muted)">${d.description || "Descripción"}</p><p style="margin:0"><strong>${money(d.price || 0)}</strong> · ${d.category || "Categoría"}</p><p style="margin:6px 0 0"><span class="s ${rowClass(d.availability || "Disponible")}">${d.availability || "Disponible"}</span> ${d.featured ? "· Destacado" : ""}</p></div>`;
    }

    function readForm() {
      return {
        id: editId,
        name: f("name").value.trim(),
        price: Number(f("price").value || 0),
        category: f("category").value,
        availability: f("availability").value,
        description: f("description").value.trim(),
        icon: f("icon").value.trim() || "✨",
        featured: f("featured").value === "true",
        tags: []
      };
    }

    function resetForm() {
      f("form").reset();
      f("icon").value = "✨";
      f("featured").value = "false";
      f("submitBtn").textContent = "Publicar producto demo";
      editId = null;
      preview();
    }

    function filtered() {
      const q = f("adminSearch").value.toLowerCase().trim();
      const cat = f("adminCat").value;
      const stock = f("adminStock").value;
      return products.filter(p => {
        if (q && !p.name.toLowerCase().includes(q)) return false;
        if (cat !== "Todo" && p.category !== cat) return false;
        if (stock !== "Todos" && p.availability !== stock) return false;
        return true;
      }).sort((a,b) => b.id - a.id);
    }

    function renderList() {
      const list = filtered();
      f("list").innerHTML = list.map(p => `<article class="row"><div class="row-top"><div><strong>${p.name}</strong><div>${p.category} · ${money(p.price)}</div></div><div><span class="s ${rowClass(p.availability)}">${p.availability}</span></div></div><div style="margin-top:6px;color:var(--muted)">${p.featured ? "Destacado" : "Normal"}</div><div class="act"><button data-edit="${p.id}" type="button">Editar</button><button data-dup="${p.id}" type="button">Duplicar</button><button data-out="${p.id}" type="button">Marcar agotado</button><button data-feat="${p.id}" type="button">${p.featured ? "Quitar destacado" : "Marcar destacado"}</button><button data-del="${p.id}" type="button">Eliminar</button></div></article>`).join("") || '<article class="row"><p style="margin:0;color:var(--muted)">Sin productos para ese filtro.</p></article>';
      stats();
    }

    f("form").addEventListener("submit", e => {
      e.preventDefault();
      const data = readForm();
      if (!data.name || !data.price || !data.description) return;
      if (editId !== null) {
        products = products.map(p => p.id === editId ? { ...p, ...data, id: editId } : p);
        toast("Producto actualizado");
      } else {
        const id = Math.max(0, ...products.map(p => p.id || 0)) + 1;
        products.unshift({ ...data, id });
        toast("Producto publicado");
      }
      persist(); renderList(); resetForm();
    });

    ["name","price","category","availability","description","icon","featured"].forEach(id => f(id).addEventListener("input", () => preview()));
    ["adminSearch","adminCat","adminStock"].forEach(id => f(id).addEventListener("input", renderList));
    ["adminCat","adminStock"].forEach(id => f(id).addEventListener("change", renderList));

    f("list").addEventListener("click", e => {
      const edit = e.target.closest("[data-edit]");
      const dup = e.target.closest("[data-dup]");
      const out = e.target.closest("[data-out]");
      const feat = e.target.closest("[data-feat]");
      const del = e.target.closest("[data-del]");

      if (edit) {
        const p = products.find(x => x.id === Number(edit.dataset.edit)); if (!p) return;
        editId = p.id;
        f("name").value = p.name; f("price").value = p.price; f("category").value = p.category; f("availability").value = p.availability; f("description").value = p.description; f("icon").value = p.icon || "✨"; f("featured").value = String(!!p.featured);
        f("submitBtn").textContent = "Guardar cambios";
        preview(p);
      }

      if (dup) {
        const p = products.find(x => x.id === Number(dup.dataset.dup)); if (!p) return;
        const id = Math.max(0, ...products.map(x => x.id || 0)) + 1;
        products.unshift({ ...p, id, name: `${p.name} (copia)`, featured: false });
        persist(); renderList(); toast("Producto duplicado");
      }

      if (out) {
        const id = Number(out.dataset.out);
        products = products.map(p => p.id === id ? { ...p, availability: "Agotado" } : p);
        persist(); renderList(); toast("Producto agotado");
      }

      if (feat) {
        const id = Number(feat.dataset.feat);
        products = products.map(p => p.id === id ? { ...p, featured: !p.featured } : p);
        persist(); renderList(); toast("Producto actualizado");
      }

      if (del) {
        const id = Number(del.dataset.del);
        products = products.filter(p => p.id !== id);
        if (editId === id) resetForm();
        persist(); renderList(); toast("Producto eliminado");
      }
    });

    f("resetDemo").addEventListener("click", () => {
      localStorage.removeItem(KEYS.products);
      localStorage.removeItem(KEYS.cart);
      localStorage.removeItem(KEYS.orders);
      products = [...baseProducts];
      localStorage.setItem(KEYS.products, JSON.stringify(products));
      resetForm(); renderList(); toast("Demo restaurada");
    });

    renderList();
    resetForm();
  </script>
</body>
</html>
