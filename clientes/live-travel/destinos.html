<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Travel | Destinos</title>
  <link rel="icon" type="image/jpeg" href="/clientes/logoixmati.jpg" />
  <link rel="stylesheet" href="live-travel.css" />
  <script src="../portal-auth.js"></script>
  <script defer src="live-travel.js"></script>
</head>
<body data-page="destinos">
  <header class="lt-nav-wrap"><div class="lt-wrap lt-nav"><a class="lt-brand" href="index.html"><img src="live.png" alt="Logo" /><span><small>Live Travel</small><strong>Plataforma comercial</strong></span></a><button class="lt-burger" type="button">☰</button><nav class="lt-menu"><a data-page="home" href="index.html">Inicio</a><a data-page="destinos" href="destinos.html">Destinos</a><a data-page="experiencias" href="experiencias.html">Experiencias</a><a data-page="cotizador" href="cotizador.html">Cotizador</a><a data-page="asesoria" href="asesoria.html">Asesoría</a></nav><div class="lt-nav-actions"><a class="lt-btn lt-btn-primary" href="cotizador.html">Cotizar viaje</a><a class="lt-btn lt-btn-outline" href="cotizacion.html">Volver a cotización</a><button class="lt-btn lt-btn-outline" id="logoutBtn" type="button">Cerrar sesión</button></div></div></header>
  <main class="lt-page lt-wrap">
    <section class="lt-section lt-reveal"><div class="lt-card"><h1>Catálogo completo de destinos</h1><p>Explora paquetes por región, presupuesto, duración y tipo de viaje.</p></div></section>
    <section class="lt-section lt-reveal">
      <div class="lt-card">
        <div class="lt-filters">
          <input id="search" class="lt-field" placeholder="Buscar destino" />
          <select id="region" class="lt-select"><option value="Todas">Región: Todas</option><option>Playa</option><option>Ciudad</option><option>Naturaleza</option><option>Internacional</option></select>
          <select id="budget" class="lt-select"><option value="Todos">Presupuesto: Todos</option><option>8-12k</option><option>12-18k</option><option>18-28k</option><option>28k+</option></select>
          <select id="duration" class="lt-select"><option value="Todas">Duración: Todas</option><option>3-4 días</option><option>5-7 días</option><option>8+ días</option></select>
          <select id="type" class="lt-select"><option value="Todos">Tipo: Todos</option><option>Pareja</option><option>Familia</option><option>Aventura</option><option>Escapada</option><option>Internacional</option><option>Lujo</option></select>
          <select id="sort" class="lt-select"><option value="recommended">Más recomendado</option><option value="price_low">Precio menor</option><option value="price_high">Precio mayor</option></select>
        </div>
        <div id="destGrid" class="lt-grid-4"></div>
      </div>
    </section>
  </main>
  <a id="floatingQuote" class="lt-btn lt-btn-primary lt-floating-cta" href="cotizador.html" style="display:none">Cotizar</a>
  <div id="ltToast" class="lt-toast"></div>
  <footer class="lt-wrap lt-footer">Live Travel · Destinos</footer>
</body>
</html>
